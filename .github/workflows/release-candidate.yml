name: Orbit Release Candidate Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend quality, migrations and regressions
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: orbit_ci
          POSTGRES_USER: orbit_ci
          POSTGRES_PASSWORD: orbit_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U orbit_ci -d orbit_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      APP_NAME: Orbit API CI
      APP_PORT: 3000
      DATABASE_URL: postgresql://orbit_ci:orbit_ci_password@127.0.0.1:5432/orbit_ci?schema=public
      TEST_DATABASE_URL: postgresql://orbit_ci:orbit_ci_password@127.0.0.1:5432/orbit_ci?schema=public
      JWT_SECRET: ci_access_secret_with_more_than_32_characters
      JWT_REFRESH_SECRET: ci_refresh_secret_with_more_than_32_chars
      JWT_ACCESS_EXPIRES_IN_SECONDS: 900
      JWT_REFRESH_EXPIRES_IN_SECONDS: 2592000
      JWT_ISSUER: orbit-ci
      JWT_AUDIENCE: orbit-ci-clients
      CORS_ORIGINS: http://localhost:4000
      STORAGE_PROVIDER: local
      STORAGE_DRIVER: local
      STORAGE_PATH: /tmp/orbit-ci-storage
      RATE_LIMIT_TTL_MS: 60000
      RATE_LIMIT_MAX: 1000
      LOG_LEVEL: error
      ENABLE_DEMO_DATA: "false"
      ENABLE_DEMO_ENDPOINTS: "false"
      OWNER_EMAIL: owner-ci@orbit.local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma validate
      - run: npx prisma migrate deploy
      - run: npm run build
      - run: npm run lint
      - run: npm test
      - run: npm run test:security
      - run: npm run test:concurrency
      - run: npm run test:integration

  frontend:
    name: Frontend quality and production build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      NEXT_PUBLIC_ENABLE_DEMO: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
