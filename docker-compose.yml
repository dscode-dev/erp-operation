services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - 5432:5432
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      STORAGE_PATH: /app/storage
    ports:
      - '${APP_PORT:-4040}:${APP_PORT:-4040}'
    volumes:
      - api_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:' + process.env.APP_PORT + '/api/v1/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    init: true
    networks:
      - backend

  # Frontend Next.js 15 — serves BOTH apps from a single image:
  #   Platform  → /            (erp.empresa.com.br em produção)
  #   Operator  → /operator    (operator.empresa.com.br em produção)
  # Em produção, um reverse proxy roteia os subdomínios para este serviço.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* são embutidos no build (acessados pelo navegador).
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://erp.allblue-labs.com/api/v1}
        NEXT_PUBLIC_ENABLE_DEMO: ${NEXT_PUBLIC_ENABLE_DEMO:-true}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${FRONTEND_PORT:-3030}
      HOSTNAME: 0.0.0.0
    ports:
      - '${FRONTEND_PORT:-3030}:${FRONTEND_PORT:-3030}'
    depends_on:
      - api
    init: true
    networks:
      - backend

volumes:
  postgres_data:
  api_storage:

networks:
  backend:
    driver: bridge
