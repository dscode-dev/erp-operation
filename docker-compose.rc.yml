services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orbit}
      POSTGRES_USER: ${POSTGRES_USER:-orbit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - orbit

  api:
    build:
      context: ./backend
    environment:
      NODE_ENV: production
      APP_NAME: ${APP_NAME:-Orbit API}
      APP_PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-orbit}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-orbit}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_EXPIRES_IN_SECONDS: ${JWT_ACCESS_EXPIRES_IN_SECONDS:-900}
      JWT_REFRESH_EXPIRES_IN_SECONDS: ${JWT_REFRESH_EXPIRES_IN_SECONDS:-2592000}
      JWT_ISSUER: ${JWT_ISSUER:-orbit-api}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-orbit-clients}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      STORAGE_PROVIDER: local
      STORAGE_DRIVER: local
      STORAGE_PATH: /app/storage
      RATE_LIMIT_TTL_MS: ${RATE_LIMIT_TTL_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENABLE_DEMO_DATA: "false"
      ENABLE_DEMO_ENDPOINTS: "false"
    volumes:
      - api-storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/v1/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - orbit

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: /api/v1
        NEXT_PUBLIC_ENABLE_DEMO: "false"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: /api/v1
      NEXT_PUBLIC_ENABLE_DEMO: "false"
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - orbit

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - api
    ports:
      - "${ORBIT_HTTP_PORT:-8080}:8080"
    volumes:
      - ./deploy/nginx/orbit.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - orbit

volumes:
  postgres-data:
  api-storage:

networks:
  orbit:
    driver: bridge
